<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 26px; background: #faf8f6; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 84px; height: 56px; background: white; border-radius: 14px; border: 1px solid rgba(42,36,32,0.04); }
  .k { font-family: Inter, sans-serif; font-size: 11px; color: #2a2420; font-weight: 600; }
  .desc { font-family: var(--font-mono); font-size: 9.5px; color: var(--fg-muted); text-align: center; line-height: 1.3; }
</style></head><body>
  <div class="row">
    <div class="cell"><div class="box" style="box-shadow:0 1px 2px rgba(42,36,32,0.04)"></div><div class="k">xs</div><div class="desc">0 1px 2px / 4%</div></div>
    <div class="cell"><div class="box" style="box-shadow:0 10px 15px -3px rgba(42,36,32,0.05)"></div><div class="k">card</div><div class="desc">0 10px 15px / 5%</div></div>
    <div class="cell"><div class="box" style="box-shadow:0 25px 50px -12px rgba(42,36,32,0.1)"></div><div class="k">lg · hover</div><div class="desc">0 25px 50px / 10%</div></div>
    <div class="cell"><div class="box" style="background:#db6f57;box-shadow:0 0 30px rgba(219,111,87,0.4)"></div><div class="k">cta · glow</div><div class="desc">0 0 30px accent/40</div></div>
  </div>
</body></html>
