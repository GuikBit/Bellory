<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 20px 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .tile { display: flex; flex-direction: column; gap: 6px; }
  .img { aspect-ratio: 1/1; border-radius: 12px; background-size: cover; background-position: center; box-shadow: 0 6px 14px rgba(42,36,32,0.08); }
  .lbl { font-family: var(--font-mono); font-size: 9.5px; color: var(--fg-muted); text-align: center; }
</style></head><body>
  <div class="grid">
    <div class="tile"><div class="img" style="background-image:url(../assets/owner-salon.jpg)"></div><div class="lbl">owner · salon</div></div>
    <div class="tile"><div class="img" style="background-image:url(../assets/owner-barbershop.jpg)"></div><div class="lbl">owner · barbershop</div></div>
    <div class="tile"><div class="img" style="background-image:url(../assets/owner-clinic.jpg)"></div><div class="lbl">owner · clinic</div></div>
    <div class="tile"><div class="img" style="background-image:url(../assets/customer-profile.jpg)"></div><div class="lbl">customer</div></div>
  </div>
</body></html>
