<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 22px 26px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .tile { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg,rgba(219,111,87,0.9),#c55a42); color: white; box-shadow: 0 6px 14px rgba(219,111,87,0.25); }
  .tile.muted { background: #f0e8e3; color: #8b3d35; box-shadow: none; }
  .tile.dark { background: rgba(255,255,255,0.1); color: #5a7a6e; }
  svg { width: 22px; height: 22px; }
  .lbl { font-family: var(--font-mono); font-size: 9px; color: var(--fg-muted); text-align: center; line-height: 1.2; }
  .note { font-family: Inter; font-size: 11px; color: var(--fg-2); margin-top: 14px; text-align: center; }
</style></head><body>
  <div class="row">
    <div class="cell"><div class="tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div class="lbl">Agenda</div></div>
    <div class="cell"><div class="tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><div class="lbl">Clientes</div></div>
    <div class="cell"><div class="tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><div class="lbl">Financeiro</div></div>
    <div class="cell"><div class="tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></div><div class="lbl">WhatsApp</div></div>
    <div class="cell"><div class="tile muted"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.6L22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4z"/></svg></div><div class="lbl">IA / muted</div></div>
    <div class="cell"><div class="tile dark" style="background:#2a2420"><svg viewBox="0 0 24 24" fill="none" stroke="#db6f57" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg></div><div class="lbl">Dark chip</div></div>
  </div>
  <div class="note">Lucide · 1.5–2px stroke · 22px glyph in 44–48px tile · 12px radius · gradient or muted variants</div>
</body></html>
