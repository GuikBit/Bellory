<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 22px 26px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { background: white; border: 1px solid #d8ccc4; border-radius: 16px; padding: 22px; box-shadow: 0 10px 15px -3px rgba(42,36,32,0.05); font-family: Inter, sans-serif; }
  .card.dark { background: #2a2420; border-color: #3d2e28; }
  .icon-tile { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg,rgba(219,111,87,0.9),#c55a42); color: white; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; box-shadow: 0 6px 14px rgba(219,111,87,0.25); }
  .card.dark .icon-tile { background: rgba(255,255,255,0.1); color: #5a7a6e; }
  svg { width: 22px; height: 22px; }
  h3 { font-family: Inter; font-weight: 600; font-size: 15px; color: #2a2420; margin-bottom: 6px; }
  .card.dark h3 { color: white; }
  p { font-size: 13px; line-height: 1.5; color: #4f6f64; }
  .card.dark p { color: #d8ccc4; }
</style></head><body>
  <div class="card">
    <div class="icon-tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
    <h3>Agenda Inteligente</h3>
    <p>Agendamento 24/7 que aprende com seu fluxo e evita conflitos de horário.</p>
  </div>
  <div class="card dark">
    <div class="icon-tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8M4 8h16M4 12h16M4 16h16M8 20v-4"/></svg></div>
    <h3>Agente IA no WhatsApp</h3>
    <p>Responde, confirma e reagenda por você — no tom que você escolher.</p>
  </div>
</body></html>
