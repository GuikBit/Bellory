<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 22px 26px; background: #faf8f6; }
  .swatches { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { aspect-ratio: 1.15/1; border-radius: 12px; padding: 10px 12px; display: flex; flex-direction: column; justify-content: flex-end; font-family: var(--font-sans); }
  .sw .name { font-size: 11px; font-weight: 600; line-height: 1.1; }
  .sw .hex { font-family: var(--font-mono); font-size: 10px; opacity: 0.8; margin-top: 2px; }
</style></head><body>
  <div class="swatches">
    <div class="sw" style="background:#2a2420;color:white"><div class="name">bg-dark</div><div class="hex">#2a2420</div></div>
    <div class="sw" style="background:#3d2e28;color:white"><div class="name">bg-dark-alt</div><div class="hex">#3d2e28</div></div>
    <div class="sw" style="background:#1a1510;color:white"><div class="name">bg-dark-deep</div><div class="hex">#1a1510</div></div>
    <div class="sw" style="background:#4f6f64;color:white"><div class="name">sage (fg-2)</div><div class="hex">#4f6f64</div></div>
    <div class="sw" style="background:#5a7d71;color:white"><div class="name">sage-2 (fg-3)</div><div class="hex">#5a7d71</div></div>
  </div>
</body></html>
