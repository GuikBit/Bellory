<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 22px 26px; display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .chip { width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0; border: 1px solid rgba(42,36,32,0.08); }
  .k { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); width: 150px; flex-shrink: 0; }
  .v { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .note { flex: 1; font-size: 12px; color: var(--fg-2); }
</style></head><body>
  <div class="row"><div class="chip" style="background:#db6f57"></div><div class="k">--accent</div><div class="note">CTAs, links, active, check icons</div><div class="v">#db6f57</div></div>
  <div class="row"><div class="chip" style="background:#8b3d35"></div><div class="k">--accent-strong</div><div class="note">Secondary button border + tab active text</div><div class="v">#8b3d35</div></div>
  <div class="row"><div class="chip" style="background:#d15847"></div><div class="k">--destructive</div><div class="note">Errors, destructive actions</div><div class="v">#d15847</div></div>
  <div class="row"><div class="chip" style="background:#4f6f64"></div><div class="k">--success</div><div class="note">Muted sage — quiet positive signals</div><div class="v">#4f6f64</div></div>
</body></html>
