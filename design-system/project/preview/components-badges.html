<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 26px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .gradient-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 999px; font-family: Inter, sans-serif; font-size: 12px; font-weight: 600; color: #8b3d35; background: linear-gradient(90deg,rgba(219,111,87,0.10),rgba(139,61,53,0.10),rgba(219,111,87,0.10)); border: 1px solid rgba(219,111,87,0.25); }
  .pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 999px; font-family: Inter, sans-serif; font-size: 11px; font-weight: 600; }
  .pill.popular { background: #db6f57; color: white; }
  .pill.free { background: #4f6f64; color: white; }
  .pill.new { background: #2a2420; color: white; }
  .pill.outline { background: white; color: #8b3d35; border: 1px solid #8b3d35; }
  .sparkle { width: 12px; height: 12px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.05em; width: 104px; flex-shrink: 0; }
</style></head><body>
  <div class="row"><span class="lbl">Feature badge</span>
    <span class="gradient-badge"><svg class="sparkle" viewBox="0 0 24 24" fill="#db6f57"><path d="M12 2l2.4 7.6L22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4z"/></svg>Novidade — IA no WhatsApp</span>
  </div>
  <div class="row"><span class="lbl">Plan pills</span>
    <span class="pill popular">Popular</span>
    <span class="pill free">Gratis</span>
    <span class="pill new">Novo</span>
    <span class="pill outline">Beta</span>
  </div>
</body></html>
