<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 26px; display: flex; flex-direction: column; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-family: Inter, sans-serif; font-size: 12px; font-weight: 600; color: #2a2420; }
  input { font-family: Inter, sans-serif; font-size: 13px; padding: 10px 14px; border-radius: 10px; border: 1px solid #d8ccc4; background: white; color: #2a2420; outline: none; }
  input::placeholder { color: rgba(79,111,100,0.5); }
  input.focused { border-color: #db6f57; box-shadow: 0 0 0 3px rgba(219,111,87,0.15); }
  .newsletter { display: flex; gap: 10px; margin-top: 4px; }
  .newsletter input { flex: 1; }
  .newsletter button { font-family: Inter; font-size: 13px; font-weight: 600; padding: 10px 18px; border-radius: 10px; border: 0; background: #db6f57; color: white; cursor: pointer; }
</style></head><body>
  <div class="field"><label>E-mail · default</label><input placeholder="voce@negocio.com.br" value="" /></div>
  <div class="field"><label style="color:#db6f57">E-mail · focused</label><input class="focused" value="maria@salaoboutique.com.br" /></div>
  <div class="field"><label>Newsletter</label><div class="newsletter"><input placeholder="Seu melhor e-mail" /><button>Inscrever →</button></div></div>
</body></html>
