<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 22px 26px; display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid #e6d9d4; padding-bottom: 8px; }
  .row:last-child { border: 0; padding-bottom: 0; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); width: 56px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.05em; }
  .sample { flex: 1; color: #2a2420; }
  .size { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); flex-shrink: 0; }
  .h1 { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 32px; line-height: 1.1; letter-spacing: -0.02em; }
  .h2 { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 24px; line-height: 1.2; letter-spacing: -0.02em; }
  .h3 { font-family: Inter, sans-serif; font-weight: 600; font-size: 18px; line-height: 1.3; }
  .body { font-family: Inter, sans-serif; font-weight: 400; font-size: 14px; line-height: 1.5; color: #4f6f64; }
</style></head><body>
  <div class="row"><div class="tag">H1</div><div class="sample h1">Plataforma completa de gestão</div><div class="size">Playfair · 700 · 36–60</div></div>
  <div class="row"><div class="tag">H2</div><div class="sample h2">Tudo que seu salão precisa</div><div class="size">Playfair · 700 · 30–44</div></div>
  <div class="row"><div class="tag">H3</div><div class="sample h3">Agenda Inteligente</div><div class="size">Inter · 600 · 18–20</div></div>
  <div class="row"><div class="tag">Body</div><div class="sample body">Gerencie agendamentos, clientes e financeiro em uma plataforma só.</div><div class="size">Inter · 400 · 14–16</div></div>
</body></html>
