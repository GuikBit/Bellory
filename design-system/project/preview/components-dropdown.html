<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 22px 26px; background: #faf8f6; }
  .menu { background: white; border: 1px solid rgba(230,217,212,0.5); border-radius: 16px; padding: 14px; font-family: Inter, sans-serif; box-shadow: 0 20px 60px -15px rgba(219,111,87,0.2), 0 10px 20px -10px rgba(0,0,0,0.1); position: relative; overflow: hidden; max-width: 400px; }
  .topline { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg,#db6f57,#c55a42); }
  .item { display: flex; align-items: flex-start; gap: 12px; padding: 10px; border-radius: 10px; position: relative; cursor: pointer; }
  .item.hover { background: rgba(219,111,87,0.06); }
  .item.hover::before { content:''; position: absolute; left: 0; top: 20%; bottom: 20%; width: 3px; border-radius: 99px; background: linear-gradient(180deg,#db6f57,#c55a42); }
  .icon-tile { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg,rgba(219,111,87,0.9),#c55a42); color: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 4px 10px rgba(219,111,87,0.25); }
  .icon-tile svg { width: 16px; height: 16px; }
  .txt { flex: 1; }
  .t { display: flex; gap: 6px; align-items: center; }
  .title { font-size: 13px; font-weight: 600; color: #2a2420; }
  .item.hover .title { color: #db6f57; }
  .pop { font-size: 9.5px; background: #db6f57; color: white; padding: 1px 7px; border-radius: 99px; font-weight: 600; }
  .desc { font-size: 11px; color: #6b5d57; margin-top: 1px; }
  .arrow { opacity: 0; color: #db6f57; }
  .item.hover .arrow { opacity: 1; }
</style></head><body>
  <div class="menu">
    <div class="topline"></div>
    <div class="item hover">
      <div class="icon-tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
      <div class="txt"><div class="t"><span class="title">Agenda Online</span><span class="pop">Popular</span></div><div class="desc">Agendamento 24/7 para seus clientes</div></div>
      <svg class="arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
    <div class="item">
      <div class="icon-tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></div>
      <div class="txt"><div class="t"><span class="title">WhatsApp Integrado</span></div><div class="desc">Comunicação direta e automática</div></div>
    </div>
  </div>
</body></html>
