<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 22px 26px; }
  .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { aspect-ratio: 1.6/1; border-radius: 14px; padding: 10px 12px; display: flex; flex-direction: column; justify-content: flex-end; font-family: var(--font-sans); border: 1px solid rgba(0,0,0,0.04); }
  .sw .name { font-size: 12px; font-weight: 600; }
  .sw .hex { font-family: var(--font-mono); font-size: 10px; opacity: 0.85; margin-top: 2px; }
</style></head><body>
  <div class="swatches">
    <div class="sw" style="background:#db6f57;color:white"><div class="name">accent</div><div class="hex">#db6f57</div></div>
    <div class="sw" style="background:#c55a42;color:white"><div class="name">accent-hover</div><div class="hex">#c55a42</div></div>
    <div class="sw" style="background:#8b3d35;color:white"><div class="name">accent-strong</div><div class="hex">#8b3d35</div></div>
    <div class="sw" style="background:#e88c76;color:#2a2420"><div class="name">accent-soft</div><div class="hex">#e88c76</div></div>
  </div>
</body></html>
