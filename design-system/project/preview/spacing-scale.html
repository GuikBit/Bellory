<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 22px 26px; display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; align-items: center; gap: 14px; }
  .k { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-1); width: 42px; flex-shrink: 0; font-weight: 500; }
  .bar { height: 14px; background: #db6f57; border-radius: 2px; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); flex-shrink: 0; }
</style></head><body>
  <div class="row"><div class="k">4</div><div class="bar" style="width:4px"></div><div class="tok">--space-1</div></div>
  <div class="row"><div class="k">8</div><div class="bar" style="width:8px"></div><div class="tok">--space-2</div></div>
  <div class="row"><div class="k">12</div><div class="bar" style="width:12px"></div><div class="tok">--space-3</div></div>
  <div class="row"><div class="k">16</div><div class="bar" style="width:16px"></div><div class="tok">--space-4</div></div>
  <div class="row"><div class="k">24</div><div class="bar" style="width:24px"></div><div class="tok">--space-6 · card gap</div></div>
  <div class="row"><div class="k">32</div><div class="bar" style="width:32px"></div><div class="tok">--space-8 · card pad</div></div>
  <div class="row"><div class="k">64</div><div class="bar" style="width:64px"></div><div class="tok">--space-16</div></div>
  <div class="row"><div class="k">128</div><div class="bar" style="width:128px"></div><div class="tok">--space-32 · section py</div></div>
</body></html>
