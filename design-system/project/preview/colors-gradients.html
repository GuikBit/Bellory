<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 22px 26px; display: flex; flex-direction: column; gap: 10px; }
  .bar { height: 56px; border-radius: 14px; position: relative; padding: 10px 16px; display: flex; flex-direction: column; justify-content: center; color: white; box-shadow: 0 8px 20px rgba(42,36,32,0.08); }
  .bar .name { font-family: var(--font-sans); font-size: 12px; font-weight: 600; letter-spacing: 0.02em; }
  .bar .formula { font-family: var(--font-mono); font-size: 10.5px; opacity: 0.85; margin-top: 2px; }
</style></head><body>
  <div class="bar" style="background: linear-gradient(90deg,#db6f57,#c55a42)"><div class="name">--gradient-accent</div><div class="formula">#db6f57 → #c55a42</div></div>
  <div class="bar" style="background: linear-gradient(90deg,#db6f57,#8b3d35 50%,#db6f57)"><div class="name">--gradient-title · animated</div><div class="formula">#db6f57 → #8b3d35 → #db6f57</div></div>
  <div class="bar" style="background: linear-gradient(90deg,#db6f57,#c55a42 50%,#8b3d35)"><div class="name">--gradient-cta</div><div class="formula">#db6f57 → #c55a42 → #8b3d35</div></div>
  <div class="bar" style="background: linear-gradient(180deg,#2a2420,#1a1510)"><div class="name">--gradient-footer</div><div class="formula">#2a2420 → #1a1510</div></div>
</body></html>
