<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 22px 26px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 72px; height: 56px; background: white; border: 1px solid #d8ccc4; box-shadow: 0 4px 12px rgba(42,36,32,0.06); }
  .k { font-family: var(--font-mono); font-size: 10px; color: var(--fg-1); font-weight: 500; }
  .desc { font-family: Inter, sans-serif; font-size: 10px; color: var(--fg-muted); text-align: center; line-height: 1.3; }
</style></head><body>
  <div class="row">
    <div class="cell"><div class="box" style="border-radius:6px"></div><div class="k">6px</div><div class="desc">sm — chips</div></div>
    <div class="cell"><div class="box" style="border-radius:8px"></div><div class="k">8px</div><div class="desc">md — inputs, nav</div></div>
    <div class="cell"><div class="box" style="border-radius:12px"></div><div class="k">12px</div><div class="desc">lg — CTAs</div></div>
    <div class="cell"><div class="box" style="border-radius:16px"></div><div class="k">16px</div><div class="desc">xl — feature card</div></div>
    <div class="cell"><div class="box" style="border-radius:24px"></div><div class="k">24px</div><div class="desc">2xl — pricing</div></div>
  </div>
</body></html>
