<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 20px 24px; background: #f0e8e3; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .tile { display: flex; flex-direction: column; gap: 6px; }
  .img { aspect-ratio: 16/10; border-radius: 10px; background: white; background-size: cover; background-position: top center; box-shadow: 0 8px 18px rgba(42,36,32,0.1); border: 1px solid #d8ccc4; }
  .lbl { font-family: var(--font-mono); font-size: 9.5px; color: var(--fg-muted); text-align: center; }
</style></head><body>
  <div class="grid">
    <div class="tile"><div class="img" style="background-image:url(../assets/dashboard-light.png)"></div><div class="lbl">dashboard</div></div>
    <div class="tile"><div class="img" style="background-image:url(../assets/agenda-light.png)"></div><div class="lbl">agenda</div></div>
    <div class="tile"><div class="img" style="background-image:url(../assets/agenda-kanban-light.png)"></div><div class="lbl">agenda kanban</div></div>
  </div>
</body></html>
