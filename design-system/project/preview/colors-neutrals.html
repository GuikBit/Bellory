<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 22px 26px; }
  .swatches { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { aspect-ratio: 1/1.05; border-radius: 12px; padding: 8px 10px; display: flex; flex-direction: column; justify-content: flex-end; font-family: var(--font-sans); border: 1px solid rgba(42,36,32,0.08); }
  .sw .name { font-size: 11px; font-weight: 600; line-height: 1.1; }
  .sw .hex { font-family: var(--font-mono); font-size: 9.5px; opacity: 0.8; margin-top: 2px; }
</style></head><body>
  <div class="swatches">
    <div class="sw" style="background:#faf8f6;color:#2a2420"><div class="name">bg-page</div><div class="hex">#faf8f6</div></div>
    <div class="sw" style="background:#ffffff;color:#2a2420"><div class="name">bg-card</div><div class="hex">#ffffff</div></div>
    <div class="sw" style="background:#f0e8e3;color:#2a2420"><div class="name">bg-muted</div><div class="hex">#f0e8e3</div></div>
    <div class="sw" style="background:#e6d9d4;color:#2a2420"><div class="name">border-light</div><div class="hex">#e6d9d4</div></div>
    <div class="sw" style="background:#d8ccc4;color:#2a2420"><div class="name">border</div><div class="hex">#d8ccc4</div></div>
    <div class="sw" style="background:#99a1af;color:white"><div class="name">fg-muted</div><div class="hex">#99a1af</div></div>
  </div>
</body></html>
