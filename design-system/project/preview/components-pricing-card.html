<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 22px 26px; background: #f0e8e3; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card { background: white; border: 1px solid #d8ccc4; border-radius: 24px; padding: 20px; box-shadow: 0 10px 15px -3px rgba(42,36,32,0.05); font-family: Inter, sans-serif; display: flex; flex-direction: column; gap: 10px; }
  .card.highlight { background: #2a2420; border-color: transparent; }
  .name { font-size: 13px; font-weight: 600; color: #8b3d35; text-transform: uppercase; letter-spacing: 0.06em; }
  .card.highlight .name { color: #db6f57; }
  .price { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 34px; color: #2a2420; letter-spacing: -0.02em; }
  .card.highlight .price { color: white; }
  .price small { font-family: Inter; font-size: 13px; font-weight: 500; color: #99a1af; }
  ul { list-style: none; display: flex; flex-direction: column; gap: 6px; font-size: 12px; color: #4f6f64; }
  .card.highlight ul { color: #e6d9d4; }
  li { display: flex; gap: 8px; align-items: center; }
  .check { width: 14px; height: 14px; color: #db6f57; flex-shrink: 0; }
  .card.highlight .check { color: white; }
  .cta { margin-top: 4px; font-family: Inter; font-weight: 600; font-size: 13px; padding: 10px 16px; border-radius: 10px; border: 0; cursor: pointer; background: white; color: #2a2420; border: 1px solid #d8ccc4; }
  .card.highlight .cta { background: #db6f57; color: white; border: 0; }
  .popular { font-size: 10px; font-weight: 600; background: #db6f57; color: white; padding: 3px 10px; border-radius: 999px; width: fit-content; }
</style></head><body>
  <div class="card">
    <div class="name">Básico</div>
    <div class="price">R$ 79<small> /mês</small></div>
    <ul><li><svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Agenda online</li><li><svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>CRM de clientes</li><li><svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Relatórios básicos</li></ul>
    <button class="cta">Começar grátis</button>
  </div>
  <div class="card highlight">
    <span class="popular">Popular</span>
    <div class="name">Profissional</div>
    <div class="price">R$ 179<small> /mês</small></div>
    <ul><li><svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Tudo do Básico</li><li><svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Agente IA WhatsApp</li><li><svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Site personalizado</li></ul>
    <button class="cta">Assinar agora</button>
  </div>
</body></html>
